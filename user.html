<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Tournament</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Audiowide&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:'Exo 2', sans-serif;
background:linear-gradient(180deg,#000,#001a00);
color:#00ff99;
}

.header{
padding:15px;
text-align:center;
font-family:'Audiowide';
background:#000;
box-shadow:0 0 15px #00ff99;
}

.wallet-badge{
position:absolute;
right:15px;
top:15px;
background:#00ff99;
color:#000;
padding:5px 10px;
border-radius:20px;
font-weight:bold;
}

.container{
padding:15px;
margin-bottom:70px;
}

.card{
background:#0a0a0a;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 0 10px #00ff99;
}

button{
width:100%;
padding:10px;
background:#00ff99;
border:none;
color:#000;
font-weight:bold;
border-radius:8px;
margin-top:8px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
background:#111;
border:1px solid #00ff99;
color:#00ff99;
border-radius:8px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
box-shadow:0 -2px 10px #00ff99;
}

.nav div{
flex:1;
text-align:center;
padding:10px;
}

.hidden{display:none;}
.small{font-size:13px;}
</style>
</head>
<body>

<div class="header">
FREE FIRE TOURNAMENT
<div class="wallet-badge" id="walletDisplay">₹0</div>
</div>

<div class="container">

<!-- Login -->
<div id="loginBox" class="card">
<h3>Login / Register</h3>
<input type="text" id="username" placeholder="Enter Username">
<input type="text" id="phone" placeholder="Enter Mobile Number">
<button onclick="loginUser()">Continue</button>
</div>

<!-- Home -->
<div id="homeSection" class="hidden"></div>

<!-- Wallet -->
<div id="walletSection" class="hidden card">
<h3>Wallet</h3>
<div id="walletAmount">Balance: ₹0</div>
</div>

<!-- Profile -->
<div id="profileSection" class="hidden card">
<h3>Profile</h3>
<div id="profileInfo"></div>
</div>

</div>

<div class="nav hidden" id="bottomNav">
<div onclick="showHome()"><i class="fa fa-home"></i></div>
<div onclick="showWallet()"><i class="fa fa-wallet"></i></div>
<div onclick="showProfile()"><i class="fa fa-user"></i></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCipJHTT26lc0VZfNwd1vB_9Ry_n15kUBI",
  authDomain: "prime-pro-league.firebaseapp.com",
  databaseURL: "https://prime-pro-league-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "prime-pro-league",
  storageBucket: "prime-pro-league.firebasestorage.app",
  messagingSenderId: "451131242519",
  appId: "1:451131242519:web:32c2957300cdd010b70452"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser=null;

// Login/Register
function loginUser(){
let uname=username.value;
let ph=phone.value;
if(!uname || !ph){ alert("Fill all fields"); return;}

let uid="U"+ph;

db.ref("users/"+uid).once("value",snap=>{
if(!snap.exists()){
db.ref("users/"+uid).set({
username:uname,
phone:ph,
wallet:0,
matches:0,
wins:0
});
}
currentUser=uid;
startApp();
});
}

function startApp(){
loginBox.style.display="none";
bottomNav.classList.remove("hidden");
showHome();
loadWallet();
}

// Load Tournaments
function showHome(){
homeSection.classList.remove("hidden");
walletSection.classList.add("hidden");
profileSection.classList.add("hidden");
homeSection.innerHTML="";

db.ref("tournaments").on("value",snap=>{
homeSection.innerHTML="";
snap.forEach(child=>{
let t=child.val();
let id=child.key;

let card=document.createElement("div");
card.className="card";
card.innerHTML=`
<h3>${t.title}</h3>
<img src="${t.banner}" width="100%" style="border-radius:8px;">
<div class="small">Entry: ₹${t.entryFee}</div>
<div class="small">Prize: ₹${t.prizePool}</div>
<div class="small">Slots: ${t.joinedCount}/${t.totalSlots}</div>
<button onclick="joinTournament('${id}',${t.entryFee},${t.totalSlots},${t.joinedCount})">Join</button>
${t.reveal ? `<div class="small">Room ID: ${t.roomId}</div>
<div class="small">Pass: ${t.roomPass}</div>`:""}
`;
homeSection.appendChild(card);
});
});
}

// Join Tournament
function joinTournament(tid,fee,total,joined){
db.ref("users/"+currentUser+"/wallet").once("value",snap=>{
let balance=snap.val()||0;
if(balance<fee){ alert("Insufficient Balance"); return;}

db.ref("users/"+currentUser).update({
wallet:balance-fee,
matches:firebase.database.ServerValue.increment(1)
});

db.ref("tournaments/"+tid).update({
joinedCount:joined+1
});

db.ref("earnings/entry").transaction(n=> (n||0)+fee);

alert("Joined Successfully");
});
}

// Wallet
function showWallet(){
homeSection.classList.add("hidden");
walletSection.classList.remove("hidden");
profileSection.classList.add("hidden");
loadWallet();
}

function loadWallet(){
db.ref("users/"+currentUser+"/wallet").on("value",snap=>{
let bal=snap.val()||0;
walletDisplay.innerText="₹"+bal;
walletAmount.innerText="Balance: ₹"+bal;
});
}

// Profile
function showProfile(){
homeSection.classList.add("hidden");
walletSection.classList.add("hidden");
profileSection.classList.remove("hidden");

db.ref("users/"+currentUser).once("value",snap=>{
let u=snap.val();
profileInfo.innerHTML=`
Username: ${u.username}<br>
Phone: ${u.phone}<br>
Matches: ${u.matches||0}<br>
Wins: ${u.wins||0}
`;
});
}
</script>

</body>
</html>
